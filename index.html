<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="calc.js" defer></script>
</head>

<body>

    <div class="container">
        <div class="display"></div>
        <div class="pad">

            <div class="upper">

                <div class="numbers">
                    <button class="button number">1</button>
                    <button class="button number">2</button>
                    <button class="button number">3</button>
                    <button class="button number">4</button>
                    <button class="button number">5</button>
                    <button class="button number">6</button>
                    <button class="button number">7</button>
                    <button class="button number">8</button>
                    <button class="button number">9</button>
                </div>
                <div class="symbols">
                    <button class="button clear">C</button>
                    <button class="button operator add">+</button>
                    <button class="button operator subtract">-</button>
                    <button class="button operator multiply">x</button>
                    <button class="button operator divide">/</button>
                </div>
            </div>

            <div class="bottom">

                <button class="button number zero">0</button>
                <button class="button number comma">.</button>
                <button class="button undo">⮌</button>
                <button class="button equal">=</button>
            </div>

        </div>
</body>

</html>
